name: Packaging and Installer Creation for Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - variant: CPU
            extras: "gui"
          - variant: GPU
            extras: "gpu,gui"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Extract clean version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VARIANT=${{ matrix.variant }}" >> "$GITHUB_ENV"
          echo "Detected version: $VERSION, variant: ${{ matrix.variant }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --icon assets/icons/app.ico \
            --name Expressive-GUI \
            --contents-directory "." \
            --splash assets/splash/big.png \
            --collect-data crepe \
            --collect-data nicegui \
            --collect-data swift_f0 \
            --add-data "examples;examples/" \
            --add-data "assets;assets/" \
            --add-data "locales;locales/" \
            --add-data "static;static/" \
            --add-data "README.md;." \
            --add-data "LICENSE;." \
            --additional-hooks-dir build/hooks \
            expressive_gui.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer with Inno Setup
        run: ISCC build/installer.iss

      - name: Generate SHA256 checksum
        run: |
          INSTALLER="dist/Expressive-GUI-$VERSION-Windows-x64-${{ matrix.variant }}.exe"
          sha256sum "$INSTALLER" > "$INSTALLER.sha256"
          cat "$INSTALLER.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            dist/Expressive-GUI-${{ env.VERSION }}-Windows-x64-${{ matrix.variant }}.exe
            dist/Expressive-GUI-${{ env.VERSION }}-Windows-x64-${{ matrix.variant }}.exe.sha256
